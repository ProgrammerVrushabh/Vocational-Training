<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board+</title>
</head>
<body bgcolor=" lightgrey" border="2">
    <h1 align="center">Chess Board</h1>
    <script>
        document.write("<table align='center' border='1' cellspacing='0' cellpadding='0'>");
        for (let i = 0; i < 8; i++) {
            document.write("<tr>");
            for (let j = 0; j < 8; j++) {
                if ((i + j) % 2 === 0) {
                    document.write("<td bgcolor='black' width='50' height='50'></td>");
                } else {
                    document.write("<td bgcolor='white' width='50' height='50'></td>");
                }
            }
            document.write("</tr>");
        }
        document.write("</table>");
    </script>
    
</body>
</html>
